<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jaya Bits</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; font-family: 'Arial', sans-serif; color: white; overflow: hidden; }

        .app-header {
            position: fixed;
            top: 0; width: 100%; text-align: center;
            padding: 20px; z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            pointer-events: none;
        }

        .reels-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .reels-container::-webkit-scrollbar { display: none; }

        .reel-card {
            position: relative;
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            transform: scale(1.6); 
            border: none;
            pointer-events: none; /* Disable interaction with iframe so container scroll works */
        }

        .overlay-info {
            position: absolute;
            bottom: 80px; left: 20px;
            z-index: 10; max-width: 85%;
            pointer-events: none;
        }

        .overlay-info h3 { font-size: 0.9rem; text-shadow: 2px 2px 4px rgba(0,0,0,1); margin-bottom: 5px; }
        .overlay-info span { color: #ff0050; font-weight: bold; }

        /* Sound Prompt UI */
        #sound-prompt {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7); padding: 15px 30px; border-radius: 30px;
            z-index: 200; cursor: pointer; border: 1px solid #fff;
        }

        #loader {
            position: fixed; bottom: 20px; width: 100%;
            text-align: center; display: none; z-index: 1000; font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="sound-prompt" onclick="unmuteAll()">Click to Play with Sound 🔊</div>

    <header class="app-header">
        <h1>The Jaya Bits</h1>
    </header>

    <div class="reels-container" id="reelsContainer"></div>
    <div id="loader">Loading more bits...</div>

    <script>
        const API_KEY = 'AIzaSyDudljWyHUaPhUW1Ux3NeSHZQkRU1fVFcc'; 
        const container = document.getElementById('reelsContainer');
        const loader = document.getElementById('loader');
        
        let nextPageToken = '';
        let isFetching = false;

        // Har bar naya content lane ke liye random keywords
        const keywords = ['shorts', 'cinematic video', 'viral reels', 'aesthetic status', 'trending'];
        const randomQuery = keywords[Math.floor(Math.random() * keywords.length)];

        async function fetchVideos(pageToken = '') {
            if (isFetching) return;
            isFetching = true;
            loader.style.display = 'block';

            try {
                // Refresh par random content lane ke liye 'search' endpoint ka use
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=10&type=video&videoEmbeddable=true&q=${randomQuery}&key=${API_KEY}&pageToken=${pageToken}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.items) {
                    nextPageToken = data.nextPageToken; 
                    renderReels(data.items);
                }
            } catch (error) {
                console.error("API Error:", error);
            } finally {
                isFetching = false;
                loader.style.display = 'none';
            }
        }

        function renderReels(videos) {
            videos.forEach((video) => {
                const id = video.id.videoId || video.id;
                const title = video.snippet.title;
                
                const reel = document.createElement('div');
                reel.classList.add('reel-card');
                
                // Mute=1 rakha hai initial load ke liye (Autoplay block na ho)
                // Sound user interaction ke baad 'unmuteAll' function se chalu hoga
                reel.innerHTML = `
                    <div class="video-wrapper">
                        <iframe 
                            src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=0&loop=1&playlist=${id}&enablejsapi=1" 
                            allow="autoplay; encrypted-media">
                        </iframe>
                    </div>
                    <div class="overlay-info">
                        <h3>${title.substring(0, 60)}</h3>
                        <span>@thejayabits</span>
                    </div>
                `;
                container.appendChild(reel);
            });
        }

        // Sabhi videos ko ek saath unmute karne ka function
        function unmuteAll() {
            const iframes = document.querySelectorAll('iframe');
            iframes.forEach(i => {
                i.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
                i.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            });
            document.getElementById('sound-prompt').style.display = 'none';
        }

        container.addEventListener('scroll', () => {
            if (container.scrollTop + container.clientHeight >= container.scrollHeight - 200) {
                if (nextPageToken) fetchVideos(nextPageToken);
            }
        });

        fetchVideos();
    </script>
</body>
</html>
