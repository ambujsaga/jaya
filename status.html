<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jaya - Status Room</title>
    <style>
        :root { 
            --primary: #00e5ff; 
            --bg: #030a1a; 
            --card-bg: rgba(6, 17, 39, 0.9); 
            --text-main: #ffffff; 
            --text-muted: #8a99b3;
            --red: #ff4444; 
            --neon-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
            --seen-color: #4a5568;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        .p-pic {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        /* --- STORIES TRAY COMPONENT --- */
        .stories-tray {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            width: 100%;
            padding: 10px 0;
            margin-bottom: 20px;
        }

        .stories-tray::-webkit-scrollbar { display: none; }

        .story-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .story-ring {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            padding: 3px;
            transition: all 0.3s ease;
        }

        /* Neon ring indicator for UNSEEN statuses */
        .story-ring.unseen {
            border: 3px solid var(--primary);
            box-shadow: var(--neon-shadow);
        }

        /* Muted gray ring for SEEN statuses */
        .story-ring.seen {
            border: 3px solid var(--seen-color);
            box-shadow: none;
        }

        .story-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .story-username {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
            max-width: 75px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* --- COLLAPSIBLE COMPONENT BOX --- */
        .toggle-create-btn {
            width: 100%;
            background: rgba(0, 229, 255, 0.1);
            color: var(--primary);
            border: 1px solid rgba(0, 229, 255, 0.3);
            padding: 14px;
            border-radius: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .toggle-create-btn:hover {
            background: rgba(0, 229, 255, 0.2);
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(0, 229, 255, 0.15);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            margin-bottom: 20px;
            display: none; /* Controlled via toggle */
        }

        .card.active {
            display: block;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            color: var(--text-main);
            box-sizing: border-box;
            outline: none;
            margin-bottom: 12px;
            font-family: inherit;
            resize: none;
        }

        .file-input-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-upload-label {
            background: rgba(0, 229, 255, 0.05);
            color: var(--primary);
            border: 1px dashed rgba(0, 229, 255, 0.4);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: #030a1a;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--neon-shadow);
        }

        /* --- FULLSCREEN VIEW MODAL --- */
        .status-viewer {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .viewer-top-panel {
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .progress-container {
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 15px;
            display: flex;
            gap: 4px;
        }

        .segment-bg {
            flex: 1;
            background: rgba(255,255,255,0.3);
            height: 100%;
            border-radius: 2px;
            overflow: hidden;
        }

        .segment-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
        }

        .viewer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .viewer-user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .viewer-close {
            color: #fff;
            font-size: 28px;
            cursor: pointer;
        }

        .viewer-content {
            width: 100%;
            max-width: 450px;
            height: 65vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .viewer-content img, .viewer-content video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .viewer-text {
            font-size: 24px;
            text-align: center;
            padding: 20px;
            word-break: break-word;
        }

        /* --- ACTION PANEL (DELETE & VIEWS TRACKER) --- */
        .viewer-action-panel {
            width: 100%;
            max-width: 450px;
            background: rgba(6, 17, 39, 0.85);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 15px 20px;
            box-sizing: border-box;
            border-radius: 20px 20px 0 0;
            text-align: center;
        }

        .view-count-trigger {
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .viewer-delete-btn {
            background: var(--red);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }

        .views-modal-list {
            font-size: 12px;
            color: #fff;
            max-height: 60px;
            overflow-y: auto;
            margin-top: 8px;
            padding: 5px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <img id="user-avatar" src="" class="p-pic" alt="Profile">
            <div>
                <div style="font-weight: bold; font-size: 18px;" id="welcome-username">@username</div>
                <div style="font-size: 12px; color: var(--text-muted);">The Jaya Status Room</div>
            </div>
        </header>

        <div class="stories-tray" id="stories-tray-zone"></div>

        <button class="toggle-create-btn" onclick="toggleCreateBox()">
            ✍️ Create New Status Update
        </button>

        <div class="card" id="create-status-card">
            <h3 style="margin-top: 0; color: var(--primary);">Create Status</h3>
            <textarea id="status-text-input" placeholder="Type your mind status text..."></textarea>
            
            <div class="file-input-wrapper">
                <label class="btn-upload-label">
                    📸 Add Photos (Max 10)
                    <input type="file" id="photo-files" accept="image/*" multiple style="display: none;" onchange="validateFiles()">
                </label>
                <label class="btn-upload-label">
                    🎥 Add Videos (Max 5)
                    <input type="file" id="video-files" accept="video/*" multiple style="display: none;" onchange="validateFiles()">
                </label>
            </div>
            <div id="file-count-status" style="font-size: 12px; margin-bottom: 10px; color: var(--text-muted);"></div>
            <button class="btn-submit" onclick="publishStatus()">Upload Status</button>
        </div>
    </div>

    <div class="status-viewer" id="status-player-modal">
        <div class="viewer-top-panel">
            <div class="progress-container" id="segments-wrapper"></div>
            <div class="viewer-header">
                <div class="viewer-user-info">
                    <img id="viewer-avatar" src="" class="p-pic" style="width: 38px; height: 38px;">
                    <strong id="viewer-username"></strong>
                </div>
                <div class="viewer-close" onclick="closeStatusViewer()">✕</div>
            </div>
        </div>

        <div class="viewer-content" id="viewer-body-render"></div>

        <div class="viewer-action-panel" id="viewer-bottom-controls">
            <div class="view-count-trigger" id="view-counter-node">👁️ 0 Views</div>
            <div class="views-modal-list" id="views-list-container" style="display:none;"></div>
            <div id="delete-action-injection"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAnpAuGPUKwptzhZmxtlt8LgS094tQ4ZGQ",
            authDomain: "the-jaya-by-ree.firebaseapp.com",
            databaseURL: "https://the-jaya-by-ree-default-rtdb.firebaseio.com",
            projectId: "the-jaya-by-ree",
            storageBucket: "the-jaya-by-ree.firebasestorage.app",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activeSessionUser = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userSnap = await getDoc(doc(db, "users", user.uid));
                    if (userSnap.exists()) {
                        activeSessionUser = userSnap.data();
                        // Add secure uid fallback parsing directly if missing inside data payload
                        if(!activeSessionUser.uid) activeSessionUser.uid = user.uid;
                        initializeStatusEngine();
                    } else {
                        throwAuthError();
                    }
                } catch (e) {
                    throwAuthError();
                }
            } else {
                throwAuthError();
            }
        });

        function throwAuthError() {
            alert("❌ Access Denied: Pahle Official Website 'The Jaya' par account login karein!");
            window.location.href = "index.html";
        }

        function initializeStatusEngine() {
            document.getElementById('user-avatar').src = activeSessionUser.pic || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            document.getElementById('welcome-username').innerText = "@" + activeSessionUser.username;
            window.currentUserProfile = activeSessionUser;
            renderStoriesTray();
        }
    </script>

    <script>
        const PHOTO_LIMIT = 10;
        const VIDEO_LIMIT = 5;
        const EXPIRATION_TIME = 24 * 60 * 60 * 1000;

        let progressAnimationInterval = null;
        let activeStoryDataReference = null;
        let currentSlidePointerIndex = 0;

        function toggleCreateBox() {
            const card = document.getElementById('create-status-card');
            card.classList.toggle('active');
        }

        function validateFiles() {
            const photos = document.getElementById('photo-files').files;
            const videos = document.getElementById('video-files').files;
            const indicator = document.getElementById('file-count-status');

            if(photos.length > PHOTO_LIMIT) {
                alert(`Maximum ${PHOTO_LIMIT} photos allowed!`);
                document.getElementById('photo-files').value = "";
                return;
            }
            if(videos.length > VIDEO_LIMIT) {
                alert(`Maximum ${VIDEO_LIMIT} videos allowed!`);
                document.getElementById('video-files').value = "";
                return;
            }
            indicator.innerText = `Selected: ${photos.length} Photo(s) | ${videos.length} Video(s)`;
        }

        function convertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function publishStatus() {
            if (!window.currentUserProfile) return;

            const textContent = document.getElementById('status-text-input').value.trim();
            const photoFiles = document.getElementById('photo-files').files;
            const videoFiles = document.getElementById('video-files').files;

            if (!textContent && photoFiles.length === 0 && videoFiles.length === 0) {
                alert("Kucch to write ya select kijiye status dalne ke liye!");
                return;
            }

            const mediaItems = [];

            if (textContent) {
                mediaItems.push({
                    slideId: 'slide_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                    type: 'text',
                    content: textContent,
                    duration: 7000,
                    views: []
                });
            }

            for(let i=0; i<photoFiles.length; i++) {
                const b64Data = await convertToBase64(photoFiles[i]);
                mediaItems.push({
                    slideId: 'slide_' + Date.now() + '_p' + i,
                    type: 'image',
                    content: b64Data,
                    duration: 7000,
                    views: []
                });
            }

            for(let i=0; i<videoFiles.length; i++) {
                const b64Data = await convertToBase64(videoFiles[i]);
                mediaItems.push({
                    slideId: 'slide_' + Date.now() + '_v' + i,
                    type: 'video',
                    content: b64Data,
                    duration: 15000,
                    views: []
                });
            }

            let collectiveStories = JSON.parse(localStorage.getItem('thejaya_stories_db') || '[]');
            const currentUid = window.currentUserProfile.uid;

            // Find if user already has an active entry stack trace
            let existingUserNode = collectiveStories.find(item => item.uid === currentUid);

            if (existingUserNode) {
                // Merge new slides smoothly inside the exact profile context data layer
                existingUserNode.slides.push(...mediaItems);
                existingUserNode.timestamp = Date.now(); // Reset delta to bubble up updates array
            } else {
                // Construct clean metadata frame node system layout
                const newStatusEntry = {
                    id: 'status_' + Date.now(),
                    uid: currentUid,
                    username: window.currentUserProfile.username,
                    avatar: window.currentUserProfile.pic || "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                    timestamp: Date.now(),
                    slides: mediaItems
                };
                collectiveStories.push(newStatusEntry);
            }

            localStorage.setItem('thejaya_stories_db', JSON.stringify(collectiveStories));

            // UI Fields Cleanup Routine
            document.getElementById('status-text-input').value = "";
            document.getElementById('photo-files').value = "";
            document.getElementById('video-files').value = "";
            document.getElementById('file-count-status').innerText = "";
            document.getElementById('create-status-card').classList.remove('active');

            alert("🚀 Status uploaded successfully matching internal platform method matrix!");
            renderStoriesTray();
        }

        function renderStoriesTray() {
            const tray = document.getElementById('stories-tray-zone');
            tray.innerHTML = "";
            
            let database = JSON.parse(localStorage.getItem('thejaya_stories_db') || '[]');
            const now = Date.now();
            const currentUid = window.currentUserProfile ? window.currentUserProfile.uid : null;

            // 24hr lifetime limit filter per explicit slides verification architecture
            database.forEach(userEntry => {
                userEntry.slides = userEntry.slides.filter(slide => {
                    const slideTime = parseInt(slide.slideId.split('_')[1]);
                    return (now - slideTime) < EXPIRATION_TIME;
                });
            });

            // Cleanup empty users who have no active slides left
            database = database.filter(userEntry => userEntry.slides.length > 0);
            localStorage.setItem('thejaya_stories_db', JSON.stringify(database));

            if(database.length === 0) {
                tray.innerHTML = `<div style="color:var(--text-muted); font-size:13px; padding-left:5px;">No active updates available...</div>`;
                return;
            }

            database.forEach(userStory => {
                // Signal detection mechanism: calculate if any slide is unseen by current session tracker
                let isUnseen = false;
                if(currentUid) {
                    isUnseen = userStory.slides.some(slide => !slide.views || !slide.views.includes(currentUid));
                }

                const node = document.createElement('div');
                node.className = 'story-node';
                node.onclick = () => openStatusViewer(userStory);

                node.innerHTML = `
                    <div class="story-ring ${isUnseen ? 'unseen' : 'seen'}">
                        <img src="${userStory.avatar}" alt="user">
                    </div>
                    <div class="story-username">@${userStory.username}</div>
                `;
                tray.appendChild(node);
            });
        }

        function openStatusViewer(storyData) {
            activeStoryDataReference = storyData;
            currentSlidePointerIndex = 0;

            const modal = document.getElementById('status-player-modal');
            document.getElementById('viewer-avatar').src = storyData.avatar;
            document.getElementById('viewer-username').innerText = "@" + storyData.username;
            
            modal.style.display = 'flex';
            
            // Generate visual segmented linear indicator bars frame
            const segmentsWrapper = document.getElementById('segments-wrapper');
            segmentsWrapper.innerHTML = "";
            for(let i=0; i < storyData.slides.length; i++) {
                const segBg = document.createElement('div');
                segBg.className = 'segment-bg';
                const segBar = document.createElement('div');
                segBar.className = 'segment-bar';
                segBar.id = `slide-bar-${i}`;
                segBg.appendChild(segBar);
                segmentsWrapper.appendChild(segBg);
            }

            playSlideshowEngine();
        }

        function playSlideshowEngine() {
            const renderTarget = document.getElementById('viewer-body-render');
            clearInterval(progressAnimationInterval);

            if(currentSlidePointerIndex >= activeStoryDataReference.slides.length) {
                closeStatusViewer();
                return;
            }

            renderTarget.innerHTML = "";
            
            // Mark previously loaded segment lines as filled completely
            for(let i=0; i<currentSlidePointerIndex; i++) {
                const bar = document.getElementById(`slide-bar-${i}`);
                if(bar) bar.style.width = "100%";
            }
            // Reset current and future indicator bars
            for(let i=currentSlidePointerIndex; i<activeStoryDataReference.slides.length; i++) {
                const bar = document.getElementById(`slide-bar-${i}`);
                if(bar) bar.style.width = "0%";
            }

            const currentSlide = activeStoryDataReference.slides[currentSlidePointerIndex];
            let playbackTimeoutLimit = currentSlide.duration || 7000;

            // Sync structural seen status metadata instantly 
            syncViewTrackRecord(currentSlide.slideId);

            // Populate active controls setup base layer
            renderActionControlPanel(currentSlide);

            if (currentSlide.type === 'text') {
                const textBlock = document.createElement('div');
                textBlock.className = 'viewer-text';
                textBlock.innerText = currentSlide.content;
                renderTarget.appendChild(textBlock);
            } 
            else if (currentSlide.type === 'image') {
                const imgNode = document.createElement('img');
                imgNode.src = currentSlide.content;
                renderTarget.appendChild(imgNode);
            } 
            else if (currentSlide.type === 'video') {
                const videoNode = document.createElement('video');
                videoNode.src = currentSlide.content;
                videoNode.autoplay = true;
                videoNode.muted = false;
                videoNode.playsInline = true;
                renderTarget.appendChild(videoNode);

                videoNode.onloadedmetadata = function() {
                    if(videoNode.duration && videoNode.duration < 15) {
                        playbackTimeoutLimit = videoNode.duration * 1000;
                    }
                };
            }

            let elapsedCounter = 0;
            const intervalTickRate = 40; 
            const progressBar = document.getElementById(`slide-bar-${currentSlidePointerIndex}`);
            
            progressAnimationInterval = setInterval(() => {
                elapsedCounter += intervalTickRate;
                const calculatedPercentage = (elapsedCounter / playbackTimeoutLimit) * 100;
                if(progressBar) progressBar.style.width = Math.min(calculatedPercentage, 100) + "%";
                
                if(elapsedCounter >= playbackTimeoutLimit) {
                    clearInterval(progressAnimationInterval);
                    currentSlidePointerIndex++;
                    playSlideshowEngine();
                }
            }, intervalTickRate);
        }

        function syncViewTrackRecord(slideId) {
            if(!window.currentUserProfile) return;
            const currentUid = window.currentUserProfile.uid;

            let database = JSON.parse(localStorage.getItem('thejaya_stories_db') || '[]');
            let structuralUpdateFlag = false;

            database.forEach(userStory => {
                userStory.slides.forEach(slide => {
                    if(slide.slideId === slideId) {
                        if(!slide.views) slide.views = [];
                        if(!slide.views.includes(currentUid)) {
                            slide.views.push(currentUid);
                            structuralUpdateFlag = true;
                        }
                    }
                });
            });

            if(structuralUpdateFlag) {
                localStorage.setItem('thejaya_stories_db', JSON.stringify(database));
                // Hot sync active runtime ref cache
                const updatedStory = database.find(item => item.id === activeStoryDataReference.id);
                if(updatedStory) activeStoryDataReference = updatedStory;
            }
        }

        function renderActionControlPanel(slide) {
            const currentUid = window.currentUserProfile ? window.currentUserProfile.uid : null;
            const deleteZone = document.getElementById('delete-action-injection');
            const counterNode = document.getElementById('view-counter-node');
            const listContainer = document.getElementById('views-list-container');
            
            deleteZone.innerHTML = "";
            listContainer.style.display = "none";
            
            const viewList = slide.views || [];
            counterNode.innerText = `👁️ ${viewList.length} View${viewList.length === 1 ? '' : 's'}`;

            // Attach dynamic toggler event securely to layout node
            counterNode.onclick = () => {
                if(listContainer.style.display === "none") {
                    listContainer.innerHTML = viewList.length > 0 
                        ? viewList.map(uid => `<div>• Viewer Account Key Reference ID: ${uid}</div>`).join('')
                        : "No views yet";
                    listContainer.style.display = "block";
                } else {
                    listContainer.style.display = "none";
                }
            };

            // Author privilege configuration parsing checks
            if(activeStoryDataReference.uid === currentUid) {
                const delBtn = document.createElement('button');
                delBtn.className = 'viewer-delete-btn';
                delBtn.innerHTML = '🗑️ Delete This Status';
                delBtn.onclick = () => executionDeleteSlideTarget(slide.slideId);
                deleteZone.appendChild(delBtn);
            }
        }

        function executionDeleteSlideTarget(slideId) {
            if(!confirm("Kya aap is status slide ko sach me delete karna chahte hain?")) return;
            
            clearInterval(progressAnimationInterval);
            let database = JSON.parse(localStorage.getItem('thejaya_stories_db') || '[]');

            database.forEach(userStory => {
                if(userStory.id === activeStoryDataReference.id) {
                    userStory.slides = userStory.slides.filter(s => s.slideId !== slideId);
                }
            });

            // Strip redundant empty object schemas completely
            database = database.filter(userStory => userStory.slides.length > 0);
            localStorage.setItem('thejaya_stories_db', JSON.stringify(database));

            alert("🗑️ Status slide deleted successfully!");
            
            // Shift target indexing or bounce tracking loops
            const activeUserEntry = database.find(item => item.id === activeStoryDataReference.id);
            if(activeUserEntry && activeUserEntry.slides.length > 0) {
                activeStoryDataReference = activeUserEntry;
                // Keep playing next remaining slide loop stack smoothly
                playSlideshowEngine();
            } else {
                closeStatusViewer();
            }
            renderStoriesTray();
        }

        function closeStatusViewer() {
            document.getElementById('status-player-modal').style.display = 'none';
            document.getElementById('viewer-body-render').innerHTML = "";
            clearInterval(progressAnimationInterval);
            renderStoriesTray();
        }

        window.onload = () => {
            renderStoriesTray();
        };
    </script>
</body>
</html>
