<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jaya - Status Room</title>
    <style>
        :root { 
            --primary: #00e5ff; 
            --bg: #030a1a; 
            --card-bg: rgba(6, 17, 39, 0.9); 
            --text-main: #ffffff; 
            --text-muted: #8a99b3;
            --red: #ff4444; 
            --neon-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        .p-pic {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        /* --- STORIES TRAY COMPONENT --- */
        .stories-tray {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            width: 100%;
            padding: 10px 0;
            margin-bottom: 25px;
        }

        .stories-tray::-webkit-scrollbar { display: none; }

        .story-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .story-ring {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            padding: 2px;
            box-shadow: var(--neon-shadow);
        }

        .story-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .story-username {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
            max-width: 75px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* --- CONTROL CARD PANEL --- */
        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(0, 229, 255, 0.15);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        textarea, input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            color: var(--text-main);
            box-sizing: border-box;
            outline: none;
            margin-bottom: 12px;
            font-family: inherit;
        }

        .file-input-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-upload-label {
            background: rgba(0, 229, 255, 0.1);
            color: var(--primary);
            border: 1px dashed var(--primary);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: #030a1a;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--neon-shadow);
        }

        /* --- FULLSCREEN ULTRA VIEW MODAL --- */
        .status-viewer {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .viewer-header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .progress-container {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
        }

        .viewer-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 30px;
            cursor: pointer;
            z-index: 11;
        }

        .viewer-content {
            width: 100%;
            max-width: 450px;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .viewer-content img, .viewer-content video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .viewer-text {
            font-size: 24px;
            text-align: center;
            padding: 20px;
            word-break: break-word;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <img id="user-avatar" src="" class="p-pic" alt="Profile">
            <div>
                <div style="font-weight: bold; font-size: 18px;" id="welcome-username">@username</div>
                <div style="font-size: 12px; color: var(--text-muted);">The Jaya Status Room</div>
            </div>
        </header>

        <div class="stories-tray" id="stories-tray-zone"></div>

        <div class="card">
            <h3 style="margin-top: 0; color: var(--primary);">Create Status</h3>
            <textarea id="status-text-input" placeholder="Type your mind status text..."></textarea>
            
            <div class="file-input-wrapper">
                <label class="btn-upload-label">
                    📸 Add Photos (Max 10)
                    <input type="file" id="photo-files" accept="image/*" multiple style="display: none;" onchange="validateFiles()">
                </label>
                <label class="btn-upload-label">
                    🎥 Add Videos (Max 5)
                    <input type="file" id="video-files" accept="video/*" multiple style="display: none;" onchange="validateFiles()">
                </label>
            </div>
            <div id="file-count-status" style="font-size: 12px; margin-bottom: 10px; color: var(--text-muted);"></div>
            <button class="btn-submit" onclick="publishStatus()">Upload Status</button>
        </div>
    </div>

    <div class="status-viewer" id="status-player-modal">
        <div class="progress-container"><div class="progress-bar" id="status-progress"></div></div>
        <div class="viewer-close" onclick="closeStatusViewer()">✕</div>
        <div class="viewer-header">
            <img id="viewer-avatar" src="" class="p-pic" style="width: 35px; height: 35px;">
            <strong id="viewer-username"></strong>
        </div>
        <div class="viewer-content" id="viewer-body-render"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Extracted Core Database Credentials from Source
        const firebaseConfig = { 
            apiKey: "AIzaSyAnpAuGPUKwptzhZmxtlt8LgS094tQ4ZGQ",
            authDomain: "the-jaya-by-ree.firebaseapp.com",
            databaseURL: "https://the-jaya-by-ree-default-rtdb.firebaseio.com",
            projectId: "the-jaya-by-ree",
            storageBucket: "the-jaya-by-ree.firebasestorage.app",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Core Global Session Identity Cache
        let activeSessionUser = null;

        // Route Authentication Gate Controller
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userSnap = await getDoc(doc(db, "users", user.uid));
                    if (userSnap.exists()) {
                        activeSessionUser = userSnap.data();
                        initializeStatusEngine();
                    } else {
                        throwAuthError();
                    }
                } catch (e) {
                    throwAuthError();
                }
            } else {
                throwAuthError();
            }
        });

        function throwAuthError() {
            alert("❌ Access Denied: Pahle Official Website 'The Jaya' par account login karein!");
            window.location.href = "index.html"; // Redirecting back to official domain view
        }

        function initializeStatusEngine() {
            document.getElementById('user-avatar').src = activeSessionUser.pic || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            document.getElementById('welcome-username').innerText = "@" + activeSessionUser.username;
            window.currentUserProfile = activeSessionUser; // Export runtime context safely
            renderStoriesTray();
        }
    </script>

    <script>
        const PHOTO_LIMIT = 10;
        const VIDEO_LIMIT = 5;
        const EXPIRATION_TIME = 24 * 60 * 60 * 1000; // 24 Hours in ms

        let storyPlaybackTimer = null;
        let progressAnimationInterval = null;

        function validateFiles() {
            const photos = document.getElementById('photo-files').files;
            const videos = document.getElementById('video-files').files;
            const indicator = document.getElementById('file-count-status');

            if(photos.length > PHOTO_LIMIT) {
                alert(`Maximum ${PHOTO_LIMIT} photos allowed!`);
                document.getElementById('photo-files').value = "";
                return;
            }
            if(videos.length > VIDEO_LIMIT) {
                alert(`Maximum ${VIDEO_LIMIT} videos allowed!`);
                document.getElementById('video-files').value = "";
                return;
            }
            indicator.innerText = `Selected: ${photos.length} Photo(s) | ${videos.length} Video(s)`;
        }

        // Convert file data directly to Base64 to secure storage offline efficiently
        function convertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function publishStatus() {
            if (!window.currentUserProfile) return;

            const textContent = document.getElementById('status-text-input').value.trim();
            const photoFiles = document.getElementById('photo-files').files;
            const videoFiles = document.getElementById('video-files').files;

            if (!textContent && photoFiles.length === 0 && videoFiles.length === 0) {
                alert("Kucch to write ya select kijiye status dalne ke liye!");
                return;
            }

            const mediaItems = [];

            // Add text status component
            if (textContent) {
                mediaItems.push({ type: 'text', content: textContent, duration: 10000 });
            }

            // Process Image buffers
            for(let i=0; i<photoFiles.length; i++) {
                const b64Data = await convertToBase64(photoFiles[i]);
                mediaItems.push({ type: 'image', content: b64Data, duration: 10000 }); // Photo explicit 10s window execution limit
            }

            // Process Video buffers
            for(let i=0; i<videoFiles.length; i++) {
                const b64Data = await convertToBase64(videoFiles[i]);
                mediaItems.push({ type: 'video', content: b64Data, duration: 25000 }); // Video explicit 25s window execution limit
            }

            const collectiveStories = JSON.parse(localStorage.getItem('thejaya_stories_db') || '[]');
            
            // Construct modern dataset entry node structure mapping reference schema
            const newStatusEntry = {
                id: 'status_' + Date.now(),
                uid: window.currentUserProfile.uid,
                username: window.currentUserProfile.username,
                avatar: window.currentUserProfile.pic || "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                timestamp: Date.now(),
                slides: mediaItems
            };

            collectiveStories.push(newStatusEntry);
            localStorage.setItem('thejaya_stories_db', JSON.stringify(collectiveStories));

            // Reset dashboard fields securely
            document.getElementById('status-text-input').value = "";
            document.getElementById('photo-files').value = "";
            document.getElementById('video-files').value = "";
            document.getElementById('file-count-status').innerText = "";

            alert("🚀 Status uploaded successfully matching internal platform method matrix!");
            renderStoriesTray();
        }

        function renderStoriesTray() {
            const tray = document.getElementById('stories-tray-zone');
            tray.innerHTML = "";
            
            let database = JSON.parse(localStorage.getItem('thejaya_stories_db') || '[]');
            const now = Date.now();

            // Self cleanup verification architecture: 24hr lifetime limit filter
            database = database.filter(item => (now - item.timestamp) < EXPIRATION_TIME);
            localStorage.setItem('thejaya_stories_db', JSON.stringify(database));

            if(database.length === 0) {
                tray.innerHTML = `<div style="color:var(--text-muted); font-size:13px; padding-left:5px;">No active updates available...</div>`;
                return;
            }

            database.forEach(userStory => {
                const node = document.createElement('div');
                node.className = 'story-node';
                node.onclick = () => openStatusViewer(userStory);

                node.innerHTML = `
                    <div class="story-ring">
                        <img src="${userStory.avatar}" alt="user">
                    </div>
                    <div class="story-username">@${userStory.username}</div>
                `;
                tray.appendChild(node);
            });
        }

        function openStatusViewer(storyData) {
            const modal = document.getElementById('status-player-modal');
            const renderTarget = document.getElementById('viewer-body-render');
            const progressBar = document.getElementById('status-progress');
            
            document.getElementById('viewer-avatar').src = storyData.avatar;
            document.getElementById('viewer-username').innerText = "@" + storyData.username;
            
            modal.style.display = 'flex';
            let activeSlideIndex = 0;

            function playSlideshow() {
                if(activeSlideIndex >= storyData.slides.length) {
                    closeStatusViewer();
                    return;
                }

                renderTarget.innerHTML = "";
                progressBar.style.width = "0%";
                
                const slide = storyData.slides[activeSlideIndex];
                let playbackTimeoutLimit = slide.duration;

                if (slide.type === 'text') {
                    const textBlock = document.createElement('div');
                    textBlock.className = 'viewer-text';
                    textBlock.innerText = slide.content;
                    renderTarget.appendChild(textBlock);
                } 
                else if (slide.type === 'image') {
                    const imgNode = document.createElement('img');
                    imgNode.src = slide.content;
                    renderTarget.appendChild(imgNode);
                } 
                else if (slide.type === 'video') {
                    const videoNode = document.createElement('video');
                    videoNode.src = slide.content;
                    videoNode.autoplay = true;
                    videoNode.muted = false;
                    videoNode.playsInline = true;
                    renderTarget.appendChild(videoNode);

                    // 25 second limit auto check injection for heavy files
                    videoNode.onloadedmetadata = function() {
                        if(videoNode.duration < 25) {
                            playbackTimeoutLimit = videoNode.duration * 1000;
                        }
                    };
                }

                // Progress Bar Timeline Control System
                let elapsedCounter = 0;
                const intervalTickRate = 50; 
                clearInterval(progressAnimationInterval);
                
                progressAnimationInterval = setInterval(() => {
                    elapsedCounter += intervalTickRate;
                    const calculatedPercentage = (elapsedCounter / playbackTimeoutLimit) * 100;
                    progressBar.style.width = Math.min(calculatedPercentage, 100) + "%";
                    
                    if(elapsedCounter >= playbackTimeoutLimit) {
                        clearInterval(progressAnimationInterval);
                        activeSlideIndex++;
                        playSlideshow();
                    }
                }, intervalTickRate);
            }

            playSlideshow();
        }

        function closeStatusViewer() {
            document.getElementById('status-player-modal').style.display = 'none';
            document.getElementById('viewer-body-render').innerHTML = "";
            clearInterval(progressAnimationInterval);
            clearTimeout(storyPlaybackTimer);
        }

        // Initial launch configuration bootstrapper loop
        window.onload = () => {
            renderStoriesTray();
        };
    </script>
</body>
</html>
