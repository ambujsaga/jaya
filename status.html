<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jaya - Status Room</title>
    <style>
        :root { 
            --primary: #00e5ff; 
            --bg: #030a1a; 
            --card-bg: rgba(6, 17, 39, 0.9); 
            --text-main: #ffffff; 
            --text-muted: #8a99b3;
            --red: #ff4444; 
            --neon-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        .p-pic {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        .red-tick {
            width: 14px;
            height: 14px;
            margin-left: 4px;
            vertical-align: middle;
            fill: #ff4444;
        }

        .stories-tray {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            width: 100%;
            padding: 10px 0;
            margin-bottom: 25px;
        }

        .stories-tray::-webkit-scrollbar { display: none; }

        .story-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .story-ring {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 3px solid var(--text-muted);
            padding: 2px;
            transition: all 0.3s ease;
        }

        .story-ring.unseen {
            border-color: var(--primary);
            box-shadow: var(--neon-shadow);
        }

        .story-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .story-username {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
            max-width: 75px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(0, 229, 255, 0.15);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        .toggle-upload-btn {
            width: 100%;
            background: rgba(0, 229, 255, 0.1);
            color: var(--primary);
            border: 1px dashed var(--primary);
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 16px;
        }

        .upload-container {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        textarea, input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            color: var(--text-main);
            box-sizing: border-box;
            outline: none;
            margin-bottom: 12px;
            font-family: inherit;
        }

        .file-input-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-upload-label {
            background: rgba(0, 229, 255, 0.1);
            color: var(--primary);
            border: 1px dashed var(--primary);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: #030a1a;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--neon-shadow);
        }

        .status-viewer {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .viewer-header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .progress-container {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            overflow: hidden;
            z-index: 10;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
        }

        .viewer-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .action-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }
        .action-btn.delete-btn { color: var(--red); }

        .viewer-content {
            width: 100%;
            max-width: 450px;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .viewer-content img, .viewer-content video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .viewer-text {
            font-size: 24px;
            text-align: center;
            padding: 20px;
            word-break: break-word;
        }

        .viewer-nav-area {
            position: absolute;
            top: 70px;
            bottom: 50px;
            left: 0;
            right: 0;
            display: flex;
            z-index: 5;
        }

        .nav-left, .nav-right {
            flex: 1;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .status-counter-display {
            position: absolute;
            bottom: 25px;
            right: 25px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }

        .viewers-list-modal {
            display: none;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--card-bg);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            max-height: 50vh;
            overflow-y: auto;
            z-index: 10000;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .floating-actions {
            position: fixed;
            bottom: 25px;
            right: 25px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
            z-index: 100;
        }

        .float-btn {
            background: var(--card-bg);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <img id="user-avatar" src="" class="p-pic" alt="Profile">
            <div>
                <div style="font-weight: bold; font-size: 18px; display: flex; align-items: center;" id="welcome-username-container">
                    <span id="welcome-username">@username</span>
                </div>
                <div style="font-size: 12px; color: var(--text-muted);">The Jaya Status Room</div>
            </div>
        </header>

        <div class="stories-tray" id="stories-tray-zone"></div>

        <div class="card">
            <button class="toggle-upload-btn" onclick="toggleUploadUI()">Add New Status</button>
            <div class="upload-container" id="upload-ui-container">
                <textarea id="status-text-input" placeholder="What's on your mind?"></textarea>
                <div class="file-input-wrapper">
                    <label class="btn-upload-label">Photos (Max 10) <input type="file" id="photo-files" accept="image/*" multiple style="display: none;" onchange="validateFiles()"></label>
                    <label class="btn-upload-label">Videos (Max 5) <input type="file" id="video-files" accept="video/*" multiple style="display: none;" onchange="validateFiles()"></label>
                </div>
                <div id="file-count-status" style="font-size: 12px; margin-bottom: 10px; color: var(--text-muted);"></div>
                <button class="btn-submit" onclick="publishStatus()">Upload Status</button>
            </div>
        </div>
    </div>

    <div class="floating-actions">
        <a href="thejayabit.html" class="float-btn">Bits</a>
        <a href="index.html" class="float-btn">> Back</a>
    </div>

    <div class="status-viewer" id="status-player-modal">
        <div class="progress-container"><div class="progress-bar" id="status-progress"></div></div>
        <div class="viewer-header">
            <div class="viewer-user-info"><img id="viewer-avatar" src="" class="p-pic" style="width: 35px; height: 35px;"><strong id="viewer-username-container"></strong></div>
            <div class="viewer-actions">
                <button id="view-count-btn" class="action-btn" style="display:none;" onclick="showViewers()"><span id="view-count-text">0</span></button>
                <button id="delete-status-btn" class="action-btn delete-btn" style="display:none;" onclick="deleteCurrentStatus()">Del</button>
                <button class="action-btn" onclick="closeStatusViewer()">X</button>
            </div>
        </div>
        <div class="viewer-nav-area"><div class="nav-left" onclick="skipPrev()"></div><div class="nav-right" onclick="skipNext()"></div></div>
        <div class="viewer-content" id="viewer-body-render"></div>
        <div id="status-counter-display" class="status-counter-display">1/1</div>
        <div id="viewers-list-panel" class="viewers-list-modal"><div id="viewers-list-content"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAnpAuGPUKwptzhZmxtlt8LgS094tQ4ZGQ", authDomain: "the-jaya-by-ree.firebaseapp.com", projectId: "the-jaya-by-ree", storageBucket: "the-jaya-by-ree.firebasestorage.app" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.db = db; window.doc = doc; window.setDoc = setDoc; window.collection = collection; window.onSnapshot = onSnapshot; window.deleteDoc = deleteDoc;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userSnap = await getDoc(doc(db, "users", user.uid));
                if (userSnap.exists()) { window.currentUserProfile = userSnap.data(); initializeStatusEngine(); }
            }
        });

        function initializeStatusEngine() {
            document.getElementById('user-avatar').src = window.currentUserProfile.pic || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            document.getElementById('welcome-username').innerText = "@" + window.currentUserProfile.username;
            window.globalStories = JSON.parse(localStorage.getItem('thejaya_stories_db_live') || '[]');
            window.renderStoriesTray();
            window.setupRealtimeStories(); 
        }
    </script>

    <script>
        // --- AUTO COMPRESSION LOGIC ---
        function compressImage(file, maxSizeMB = 1) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1080;
                        const MAX_HEIGHT = 1920;
                        let width = img.width, height = img.height;
                        if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } }
                        else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        let quality = 0.9;
                        let dataUrl = canvas.toDataURL('image/jpeg', quality);
                        const maxLen = maxSizeMB * 1024 * 1024 * 1.33;
                        while (dataUrl.length > maxLen && quality > 0.1) { quality -= 0.1; dataUrl = canvas.toDataURL('image/jpeg', quality); }
                        resolve(dataUrl);
                    };
                };
            });
        }

        async function publishStatus() {
            if (!window.currentUserProfile) return;
            const textContent = document.getElementById('status-text-input').value.trim();
            const photoFiles = document.getElementById('photo-files').files;
            const videoFiles = document.getElementById('video-files').files;

            if (!textContent && photoFiles.length === 0 && videoFiles.length === 0) return alert("Please write or select media!");

            document.querySelector('.btn-submit').innerText = "Compressing & Uploading...";
            document.querySelector('.btn-submit').disabled = true;

            const newSlides = [];
            const now = Date.now();
            if (textContent) newSlides.push({ id: 's_'+now+'_t', type: 'text', content: textContent, duration: 10000, timestamp: now, viewedBy: [] });

            for(let i=0; i<photoFiles.length; i++) {
                const b64Data = await compressImage(photoFiles[i], 1);
                newSlides.push({ id: 's_'+now+'_p'+i, type: 'image', content: b64Data, duration: 10000, timestamp: now, viewedBy: [] });
            }

            for(let i=0; i<videoFiles.length; i++) {
                if (videoFiles[i].size > 1048576) { alert("Video too large (>1MB): " + videoFiles[i].name); continue; }
                const reader = new FileReader();
                await new Promise(r => { reader.readAsDataURL(videoFiles[i]); reader.onload = () => { 
                    newSlides.push({ id: 's_'+now+'_v'+i, type: 'video', content: reader.result, duration: 25000, timestamp: now, viewedBy: [] });
                    r();
                }});
            }
            
            const userDocRef = window.doc(window.db, "status_stories", window.currentUserProfile.uid);
            await window.setDoc(userDocRef, { uid: window.currentUserProfile.uid, username: window.currentUserProfile.username, avatar: window.currentUserProfile.pic, slides: newSlides });
            alert("Uploaded successfully!");
            location.reload();
        }

        // Rest of your existing functions (setupRealtimeStories, playSlideshow, etc.) remain unchanged below...
    </script>
</body>
</html>
