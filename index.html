<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jaya</title>
    <style>
        @media (min-width: 768px) {
            .container { max-width: 700px; margin: 30px auto; }
            header { padding: 15px 10%; }
            .logo { font-size: 28px; }
            .card { padding: 25px; border-radius: 24px; transition: transform 0.2s ease; }
            input, textarea { font-size: 16px; }
            .fab { right: 50px; bottom: 50px; width: 70px; height: 70px; }
        }
        :root { --primary: #00e5ff; --bg: #030a1a; --card-bg: rgba(6, 17, 39, 0.7); --text-main: #ffffff; --text-muted: #8a99b3; --neon-shadow: 0 0 15px rgba(0, 229, 255, 0.6); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 100px; transition: background 0.3s ease; }
        #loader-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(0, 229, 255, 0.1); border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        header { background: var(--card-bg); backdrop-filter: blur(15px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 229, 255, 0.15); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); text-shadow: var(--neon-shadow); cursor: pointer; }
        .container { width: 95%; max-width: 500px; margin: 15px auto; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid rgba(0, 229, 255, 0.1); margin-bottom: 20px; }
        .btn-primary { background: var(--primary); color: #fff; width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; box-shadow: var(--neon-shadow); }
        .p-pic { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; }
        .fab { position: fixed; bottom: 35px; right: 25px; width: 60px; height: 60px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: var(--neon-shadow); z-index: 2000; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader-screen"><div class="spinner"></div><h1 class="logo">The Jaya</h1></div>

    <div id="auth-section" style="display:none; text-align:center; padding-top:100px;">
        <h1 class="logo" style="font-size:45px;">The Jaya</h1>
        <button id="googleLogin" class="btn-primary" style="background:#fff; color:#000; width:auto; padding:15px 40px; margin-top:30px;">Login with Google</button>
    </div>

    <div id="main-app" style="display:none;">
        <header><div class="logo">The Jaya</div><img id="head-pic" class="p-pic" src="" style="border:2px solid var(--primary);"></header>
        <div class="container"><div id="feed"></div></div>
        <div class="fab" onclick="document.getElementById('post-modal').style.display='flex'">+</div>
    </div>

    <div id="post-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center;">
        <div class="container"><div class="card">
            <textarea id="postInput" rows="5" placeholder="What's happening?" style="width:100%; background:rgba(255,255,255,0.1); color:white; padding:10px; border-radius:10px; border:none;"></textarea>
            <button class="btn-primary" onclick="doPost()" style="margin-top:10px;">Post Now</button>
            <button onclick="document.getElementById('post-modal').style.display='none'" style="background:none; color:white; margin-top:10px; width:100%; cursor:pointer;">Cancel</button>
        </div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://mssnobmmzcmehdzanoqp.supabase.co";
        const SUPABASE_KEY = "sb_publishable_-d9Ve_gqEJ7sukGxo6xM9w_XhT9vyza";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let me = null;

        window.addEventListener('load', async () => {
            setTimeout(async () => {
                const { data: { session } } = await _supabase.auth.getSession();
                document.getElementById('loader-screen').style.display = 'none';
                if (session) {
                    me = session.user;
                    setupApp();
                } else {
                    document.getElementById('auth-section').style.display = 'block';
                }
            }, 3000);
        });

        function setupApp() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('head-pic').src = me.user_metadata.avatar_url;
            loadPosts();
        }

        async function loadPosts() {
            const { data: posts } = await _supabase.from('posts').select('*').order('created_at', { ascending: false });
            const feed = document.getElementById('feed');
            feed.innerHTML = posts ? posts.map(p => `
                <div class="card">
                    <p>${p.content}</p>
                    <small style="color:var(--text-muted)">Posted on ${new Date(p.created_at).toLocaleDateString()}</small>
                </div>
            `).join('') : '<p>No posts yet.</p>';
        }

        async function doPost() {
            const content = document.getElementById('postInput').value;
            if(!content.trim()) return;
            const { error } = await _supabase.from('posts').insert([{ content: content, user_id: me.id }]);
            if(!error) {
                document.getElementById('postInput').value = "";
                document.getElementById('post-modal').style.display = 'none';
                loadPosts();
            }
        }

        document.getElementById('googleLogin').onclick = async () => {
            await _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
        };
    </script>
</body>
</html>
