<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jaya</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg?v=1.1">
    <link rel="apple-touch-icon" sizes="192x192" href="logo.jpg?v=1.1">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

     <style>
        /* --- DESKTOP OPTIMIZATION --- */
        @media (min-width: 768px) {
            .container { max-width: 700px; margin: 30px auto; }
            header { padding: 15px 10%; }
            .logo { font-size: 28px; }
            .card { padding: 25px; border-radius: 24px; transition: transform 0.2s ease; }
            .card:hover { border-color: var(--primary); }
            input, textarea { font-size: 16px; }
            .fab { right: 50px; bottom: 50px; width: 70px; height: 70px; }
            .p-pic { width: 50px; height: 50px; }
            .stats-grid { grid-template-columns: 1fr 1fr 1fr 1fr; gap: 20px; }
            #post-modal .container { max-width: 600px; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--card-bg); border-radius: 10px; border: 1px solid var(--primary); }

        :root { 
            --primary: #00e5ff; 
            --bg: #030a1a; 
            --card-bg: rgba(6, 17, 39, 0.7); 
            --text-main: #ffffff; 
            --text-muted: #8a99b3;
            --star: #ffd700; 
            --red: #ff4444; 
            --neon-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }

        body.light-mode {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1c1e21;
            --text-muted: #65676b;
            --primary: #008ad3;
            --neon-shadow: 0 4px 12px rgba(0, 138, 211, 0.2);
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding-bottom: 100px; 
            overflow-x: hidden; 
            transition: background 0.3s ease;
        }

        header { 
            background: var(--card-bg); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(0, 229, 255, 0.15); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }

        .logo { font-size: 24px; font-weight: 800; color: var(--primary); cursor: pointer; text-shadow: var(--neon-shadow); }
        .container { width: 95%; max-width: 500px; margin: 15px auto; }
        
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid rgba(0, 229, 255, 0.1); 
            margin-bottom: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            position: relative;
        }
         .card p {
            overflow-wrap: break-word;
            word-break: break-word;
            white-space: pre-wrap;
        }

        input, textarea { 
            width: 100%; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; 
            padding: 12px; 
            color: var(--text-main); 
            box-sizing: border-box; 
            outline: none; 
        }
        
        button { cursor: pointer; border: none; border-radius: 12px; padding: 10px 15px; font-weight: bold; }
        .btn-primary { background: var(--primary); color: #fff; width: 100%; box-shadow: var(--neon-shadow); }

        .fab { 
            position: fixed; bottom: 35px; right: 25px; 
            width: 60px; height: 60px; 
            background: var(--primary); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: #fff; 
            box-shadow: var(--neon-shadow); 
            z-index: 2000; cursor: pointer; 
        }

        .p-pic { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: #1c1e21; }
        .user-info { display: flex; flex-direction: column; justify-content: center; }
        .post-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        
        .action-bar { display: flex; justify-content: flex-end; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; margin-top: 15px; }
        
        .download-btn { background: transparent; color: var(--primary); cursor: pointer; display: flex; align-items: center; }
        .watermark { display: none; font-size: 10px; color: var(--primary); opacity: 0.6; text-align: right; margin-top: 10px; font-weight: bold; }

        svg { width: 20px; height: 20px; fill: currentColor; }
        .del-icon { width: 18px; height: 18px; fill: var(--red); opacity: 0.7; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .stat-card { background: rgba(0, 229, 255, 0.05); padding: 15px; border-radius: 18px; border: 1px solid var(--primary); text-align: center; }
        .stat-val { display: block; font-size: 28px; font-weight: 800; color: var(--primary); }
        #search-row { display: none; padding: 15px; background: var(--card-bg); border-bottom: 1px solid var(--primary); }

        #loader-screen {
            position: fixed; inset: 0; background: #030a1a;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        .loader-visual { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; }
        .planet { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 40px var(--primary); animation: pulse 2s infinite; }
        .orbit { position: absolute; width: 100px; height: 100px; border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 50%; animation: spin 3s linear infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader-screen">
        <div class="loader-visual"><div class="planet"></div><div class="orbit"></div></div>
        <div class="logo">The Jaya</div>
    </div>

    <div id="auth-section" style="display:none; text-align:center; padding-top:100px;">
        <h1 class="logo" style="font-size:45px;">The Jaya</h1>
        <button id="googleLogin" class="btn-primary" style="background:#fff; color:#000; width:auto; padding:12px 30px; margin-top:30px;"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Login with Google</button>
        <p id="guest-trigger" style="color:var(--primary); margin-top:20px; cursor:pointer;">Continue as Guest</p>
    </div>

    <div id="main-app" style="display:none;">
        <header>
            <div class="logo" onclick="navTo('home')">The Jaya</div>
            <div style="display:flex; align-items:center; gap:18px;">
                <span onclick="requireLogin(toggleSearch)" style="cursor:pointer; color: var(--text-muted);"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></span>
                <img id="head-pic" src="" class="p-pic" onclick="requireLogin(() => navTo('profile', true))" style="cursor:pointer; border:2px solid var(--primary);">
            </div>
        </header>

        <div id="search-row">
            <div style="display:flex; gap:10px;"><input type="text" id="sq" placeholder="Search @username..."><button onclick="findUser()" class="btn-primary" style="width: auto;">Go</button></div>
        </div>

        <div class="container">
            <div id="home-view"><div id="feed"></div></div>
            <div id="profile-view" style="display:none;" class="card">
                <div style="text-align:center;">
                    <img id="u-img" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--primary); object-fit:cover;">
                    <h2 id="u-name">@username</h2>
                    <div class="stats-grid">
                        <div class="stat-card"><span id="s-stars" class="stat-val">0</span><small>Stars</small></div>
                        <div class="stat-card"><span id="s-posts" class="stat-val">0</span><small>Posts</small></div>
                    </div>
                    <div id="my-controls" style="display:none;">
                        <button onclick="logout()" style="background:var(--red); color:white; width:100%;">Logout</button>
                    </div>
                </div>
                <div id="u-feed"></div>
            </div>
        </div>
        <div id="fab-btn" class="fab" onclick="requireLogin(() => setPostModal(true))"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>
    </div>

    <div id="post-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center;">
        <div class="container"><div class="card">
            <h3>New Post</h3>
            <textarea id="postInput" rows="5" placeholder="What's happening?"></textarea>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn-primary" onclick="doPost()">Post</button>
                <button onclick="setPostModal(false)" style="background:rgba(255,255,255,0.1); color:var(--text-main);">Cancel</button>
            </div>
        </div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, deleteDoc, getDoc, setDoc, where, getDocs, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const defaultAvtr = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        const conf = { apiKey: "AIzaSyAnpAuGPUKwptzhZmxtlt8LgS094tQ4ZGQ", authDomain: "the-jaya-by-ree.firebaseapp.com", projectId: "the-jaya-by-ree" };
        
        const app = initializeApp(conf);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const gProv = new GoogleAuthProvider();
        let me = null;

        window.addEventListener('load', () => { setTimeout(() => { document.getElementById('loader-screen').style.display = 'none'; }, 2000); });

        const timeAgo = (t) => {
            const d = Date.now() - t, m = Math.floor(d/60000), h = Math.floor(m/60);
            return m < 1 ? "Just now" : m < 60 ? m+"m ago" : h < 24 ? h+"h ago" : Math.floor(h/24)+"d ago";
        };

        const iconDelete = '<svg class="del-icon" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>';
        const iconDownload = '<svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>';

        onAuthStateChanged(auth, async (u) => {
            if(u) {
                const dSnap = await getDoc(doc(db, "users", u.uid));
                if(!dSnap.exists()) {
                    const un = u.displayName.replace(/\s+/g,'').toLowerCase() + Math.floor(Math.random()*99);
                    await setDoc(doc(db, "users", u.uid), { username: un, uid: u.uid, pic: u.photoURL, lastChange: Date.now() });
                    location.reload();
                } else {
                    me = dSnap.data();
                    document.getElementById('main-app').style.display = 'block';
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('head-pic').src = me.pic || defaultAvtr;
                    navTo('home');
                }
            } else {
                document.getElementById('auth-section').style.display = 'block';
            }
        });

        window.navTo = (v, isMe = true, other = null) => {
            document.getElementById('home-view').style.display = v === 'home' ? 'block' : 'none';
            document.getElementById('profile-view').style.display = v === 'profile' ? 'block' : 'none';
            if(v === 'home') loadFeed("feed", null);
            if(v === 'profile') {
                const user = isMe ? me : other;
                document.getElementById('u-img').src = user.pic || defaultAvtr;
                document.getElementById('u-name').innerText = "@" + user.username;
                document.getElementById('my-controls').style.display = isMe ? 'block' : 'none';
                loadFeed("u-feed", user.uid);
            }
        };

        function loadFeed(divId, uid) {
            let q = uid ? query(collection(db, "posts"), where("uid", "==", uid), orderBy("time", "desc")) 
                        : query(collection(db, "posts"), orderBy("time", "desc"));

            onSnapshot(q, (s) => {
                const div = document.getElementById(divId); div.innerHTML = "";
                let stars = 0, posts = 0;
                s.forEach(d => {
                    const p = d.data();
                    if(uid) { stars += (p.stars?.length || 0); posts++; }
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.id = `post-card-${d.id}`;
                    el.innerHTML = `
                        <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px;">
                            <img src="${p.pic || defaultAvtr}" class="p-pic">
                            <div class="user-info">
                                <strong onclick="findUserByUname('${p.username}')" style="cursor:pointer;">@${p.username}</strong>
                                <span class="post-time">${timeAgo(p.time)}</span>
                            </div>
                            ${(auth.currentUser && auth.currentUser.uid === p.uid) ? `<div onclick="delPost('${d.id}')" style="margin-left:auto; cursor:pointer;">${iconDelete}</div>` : ''}
                        </div>
                        <p>${p.text}</p>
                        <div class="watermark">The Jaya • @${p.username}</div>
                        <div class="action-bar">
                            <span class="download-btn" onclick="downloadPost('${d.id}')">
                                ${iconDownload}
                            </span>
                        </div>
                    `;
                    div.appendChild(el);
                });
                if(uid) { document.getElementById('s-stars').innerText = stars; document.getElementById('s-posts').innerText = posts; }
            });
        }

        // DOWNLOAD METHOD
        window.downloadPost = async (postId) => {
            const postElement = document.getElementById(`post-card-${postId}`);
            const watermark = postElement.querySelector('.watermark');
            const actionBar = postElement.querySelector('.action-bar');
            
            watermark.style.display = 'block';
            actionBar.style.display = 'none';

            const canvas = await html2canvas(postElement, { backgroundColor: '#030a1a', scale: 2 });
            
            watermark.style.display = 'none';
            actionBar.style.display = 'flex';

            const link = document.createElement('a');
            link.download = `TheJaya-${postId}.png`;
            link.href = canvas.toDataURL();
            link.click();
        };

        window.doPost = async () => {
            const t = document.getElementById('postInput').value;
            if(!t.trim()) return;
            await addDoc(collection(db, "posts"), { text: t, username: me.username, pic: auth.currentUser.photoURL, uid: auth.currentUser.uid, stars: [], comments: [], time: Date.now() });
            setPostModal(false);
        };
        window.delPost = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "posts", id)); };
        window.setPostModal = (s) => document.getElementById('post-modal').style.display = s?'flex':'none';
        window.toggleSearch = () => { const s = document.getElementById('search-row'); s.style.display = s.style.display==='block'?'none':'block'; };
        window.logout = () => signOut(auth).then(() => location.reload());
        document.getElementById('googleLogin').onclick = () => signInWithPopup(auth, gProv);
        document.getElementById('guest-trigger').onclick = () => { document.getElementById('auth-section').style.display='none'; document.getElementById('main-app').style.display='block'; loadFeed("feed", null); };

    </script>
</body>
</html>
